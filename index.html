<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Eerie Market — Where Monsters Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Georgia', serif;
            background-color: #0d0d0d;
            color: #d4d4d4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: 3rem;
            color: #8b4513;
            text-align: center;
            margin-bottom: 10px;
            font-family: 'Times New Roman', serif;
            letter-spacing: 3px;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #6b8e23;
            margin-bottom: 40px;
            font-style: italic;
        }
        .shop-link {
            background: linear-gradient(135deg, #2d1f1f 0%, #1a1a1a 100%);
            border: 2px solid #8b4513;
            padding: 30px 50px;
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(139, 69, 19, 0.3);
        }
        .shop-link:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(139, 69, 19, 0.6);
        }
        .shop-link h2 {
            color: #d4af37;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        .shop-link p {
            color: #a0a0a0;
            font-size: 1rem;
        }
        .monsters {
            margin-top: 60px;
            text-align: center;
        }
        .monsters h3 {
            color: #4a4a4a;
            font-size: 1rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .footer {
            margin-top: auto;
            padding-top: 60px;
            color: #3d3d3d;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <h1>THE EERIE MARKET</h1>
    <p class="subtitle">"Where monsters find their cursed treasures"</p>
    
    <a href="https://www.etsy.com/shop/BookedandBewitched" class="shop-link" target="_blank">
        <h2>🛍️ Visit Our Etsy Shop</h2>
        <p>Handcrafted goodies for the darkly inclined</p>
    </a>
    
    <div class="monsters">
        <h3>Featuring Monster Product Reviews</h3>
        <p>Bernard the QA Supervisor rates werewolf grooming, vampire antiques & more!</p>
    </div>
    
    <div class="footer">
        <p>© 2026 The Eerie Market. Rated E for Eerie.</p>
    </div>
</body>
</html>
